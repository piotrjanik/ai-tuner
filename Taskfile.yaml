version: "3"

vars:
  VENV: .venv
  PYTHON: "{{.VENV}}/bin/python"
  # CPU priority: 0=normal, 10=polite, 19=background. Use when laptop is in use.
  NICE: "0"
  # Override on CLI: task export:gguf QUANT=Q4_K_M  or  task push:hf:gguf MODEL_NAME=x HF_REPO=user/x
  QUANT:
    sh: grep 'gguf_quantization:' config.yaml | awk '{print $2}' | tr -d '"'
  QUANT_LOWER: "{{.QUANT | lower}}"
  HF_REPO:
    sh: grep 'hf_repo:' config.yaml | awk '{print $2}' | tr -d '"'
  MODEL_NAME:
    sh: grep 'ollama_model_name:' config.yaml | awk '{print $2}' | tr -d '"'
  LLAMA_CONVERT:
    sh: ls /opt/homebrew/Cellar/llama.cpp/*/libexec/convert_hf_to_gguf.py | tail -1

tasks:
  cli:
    desc: "Run the CLI (e.g. task cli -- train --nice 10)"
    deps: [venv]
    cmds:
      - "{{.PYTHON}} src/cli.py {{.CLI_ARGS}}"

  venv:
    desc: Create .venv and install dependencies
    cmds:
      - "test -d {{.VENV}} || uv venv {{.VENV}}"
      - uv pip install -r src/requirements.txt

  repos:
    desc: Clone source repos from config.yaml
    deps: [venv]
    cmds:
      - "{{.PYTHON}} src/data/prepare_data.py --clone-only"

  data:
    desc: Extract training data from all sources
    deps: [venv]
    cmds:
      - "{{.PYTHON}} src/data/prepare_data.py"

  stats:
    desc: Show data extraction stats (no files written)
    deps: [venv]
    cmds:
      - "{{.PYTHON}} src/data/prepare_data.py --stats-only"

  train:
    desc: "Fine-tune with mlx-lm. Throttle: task train NICE=10 -- --batch-size 1 --max-seq-length 2048"
    deps: [data, venv]
    cmds:
      - "nice -n {{.NICE}} {{.PYTHON}} src/train/train.py {{.CLI_ARGS}}"

  train:google:
    desc: "Train on Google Cloud GPU VM (default: L4). Override: task train:google -- --gpu a100"
    preconditions:
      - sh: command -v gcloud
        msg: "Install gcloud CLI: https://cloud.google.com/sdk/docs/install"
      - sh: gcloud config get-value project 2>/dev/null | grep -q .
        msg: "Set GCP project: gcloud config set project YOUR_PROJECT"
    cmds:
      - ./scripts/train_google.sh {{.CLI_ARGS}}

  train:vertex:
    desc: "Train on Vertex AI (default: L4). Override: task train:vertex -- --gpu a100"
    deps: [data]
    preconditions:
      - sh: command -v gcloud
        msg: "Install gcloud CLI: https://cloud.google.com/sdk/docs/install"
      - sh: gcloud config get-value project 2>/dev/null | grep -q .
        msg: "Set GCP project: gcloud config set project YOUR_PROJECT"
      - sh: test -f data/train.jsonl
        msg: "Run 'task data' first to prepare training data"
    cmds:
      - ./scripts/train_vertex.sh {{.CLI_ARGS}}

  export:
    desc: Fuse LoRA adapters into output/merged/ (float16)
    deps: [venv]
    preconditions:
      - test -d output/adapters
    cmds:
      - "{{.PYTHON}} src/export/export_model.py"

  export:gguf:
    desc: "Convert merged model to {{.QUANT}} GGUF for Ollama / LM Studio"
    deps: [venv]
    preconditions:
      - sh: test -d output/merged
        msg: "Run 'task export' first"
    cmds:
      - mkdir -p output/gguf
      - "{{.PYTHON}} {{.LLAMA_CONVERT}} output/merged --outfile output/gguf/{{.MODEL_NAME}}-f16.gguf --outtype f16"
      - llama-quantize output/gguf/{{.MODEL_NAME}}-f16.gguf output/gguf/{{.MODEL_NAME}}-{{.QUANT_LOWER}}.gguf {{.QUANT}}
      - rm output/gguf/{{.MODEL_NAME}}-f16.gguf
      - ls -lh output/gguf/

  push:hf:
    desc: Push LoRA adapters to HuggingFace Hub
    deps: [venv]
    preconditions:
      - test -d output/adapters
    cmds:
      - "{{.PYTHON}} src/export/export_model.py --push"

  push:hf:gguf:
    desc: "Push {{.QUANT}} GGUF to HuggingFace (downloadable by LM Studio and Ollama)"
    deps: [venv]
    preconditions:
      - sh: test -f output/gguf/{{.MODEL_NAME}}-{{.QUANT_LOWER}}.gguf
        msg: "Run 'task export:gguf' first"
    cmds:
      - "{{.PYTHON}} -m huggingface_hub.cli.hf upload {{.HF_REPO}} output/gguf/{{.MODEL_NAME}}-{{.QUANT_LOWER}}.gguf {{.MODEL_NAME}}-{{.QUANT_LOWER}}.gguf --repo-type model"

  ollama:
    desc: Import GGUF into Ollama
    preconditions:
      - sh: test -f output/gguf/{{.MODEL_NAME}}-{{.QUANT_LOWER}}.gguf
        msg: "Run 'task export:gguf' first"
    cmds:
      - ollama create {{.MODEL_NAME}} -f output/gguf/Modelfile

  infer:
    desc: Interactive inference with the fine-tuned model
    deps: [venv]
    preconditions:
      - test -d output/adapters
    cmds:
      - "{{.PYTHON}} src/inference/inference.py -i"
    interactive: true

  notebook:upload:
    desc: "Upload training notebook to Vertex AI Workbench instance"
    vars:
      GCP_PROJECT:
        sh: gcloud config get-value project 2>/dev/null
      REGION: '{{.REGION | default "us-central1"}}'
      INSTANCE: '{{.INSTANCE | default "training-notebook"}}'
      GCS_BUCKET: 'gs://{{.GCP_PROJECT}}-notebooks'
    preconditions:
      - sh: command -v gcloud
        msg: "Install gcloud CLI: https://cloud.google.com/sdk/docs/install"
      - sh: gcloud config get-value project 2>/dev/null | grep -q .
        msg: "Set GCP project: gcloud config set project YOUR_PROJECT"
      - sh: test -f notebooks/train_colab.ipynb
        msg: "Notebook not found: notebooks/train_colab.ipynb"
    cmds:
      - echo "Ensuring GCS bucket {{.GCS_BUCKET}} exists..."
      - gcloud storage buckets create {{.GCS_BUCKET}} --location={{.REGION}} 2>/dev/null || true
      - echo "Uploading notebook to {{.GCS_BUCKET}}/notebooks/"
      - gcloud storage cp notebooks/train_colab.ipynb {{.GCS_BUCKET}}/notebooks/train_colab.ipynb
      - gcloud storage cp config.yaml {{.GCS_BUCKET}}/notebooks/config.yaml
      - gcloud storage cp -r src/ {{.GCS_BUCKET}}/notebooks/src/
      - echo "Done. Files uploaded to {{.GCS_BUCKET}}/notebooks/"
      - echo "Open Vertex AI Workbench in the console and create/open an instance to use the notebook."

  clean:
    desc: Remove generated data and model outputs
    cmds:
      - rm -rf data/ output/

  clean:all:
    desc: Remove everything (data, output, repos, venv)
    cmds:
      - rm -rf data/ output/ repos/ {{.VENV}}
